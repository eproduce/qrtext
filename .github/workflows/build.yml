name: Build & Release
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Linux：deb + rpm + 麒麟专用 AppImage（自包含 glibc 全家桶） ──
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable

      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libssl-dev patchelf file rpm

      - run: npm ci
      - run: npx vite build

      - name: 构建 Tauri 二进制
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles deb,rpm

      - name: 制作麒麟专用 AppImage（自包含 glibc + webkit2gtk-4.1 + GTK3）
        run: |
          set -e
          BIN="src-tauri/target/release/qrtext"
          APPDIR="/tmp/QRTEXT.AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/icons" "$APPDIR/usr/share/applications" "$APPDIR/usr/lib"

          cp "$BIN" "$APPDIR/usr/bin/qrtext"

          cat > "$APPDIR/usr/share/applications/qrtext.desktop" << 'DESKEOF'
          [Desktop Entry]
          Type=Application
          Name=QRTEXT
          Icon=qrtext
          Exec=qrtext
          Categories=Utility;
          DESKEOF

          cp src-tauri/icons/128x128.png "$APPDIR/usr/share/icons/qrtext.png"
          cp src-tauri/icons/128x128.png "$APPDIR/qrtext.png"

          # 安装 linuxdeploy + GTK 插件
          wget -qO /usr/local/bin/linuxdeploy \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x /usr/local/bin/linuxdeploy
          wget -qO /usr/local/bin/linuxdeploy-plugin-gtk.sh \
            "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          chmod +x /usr/local/bin/linuxdeploy-plugin-gtk.sh

          # ── 1. linuxdeploy 拉所有 NEEDED 库 + GTK（不打包，只复制库） ──
          cd /tmp
          DEPLOY_GTK_VERSION=3 linuxdeploy \
            --appdir "$APPDIR" \
            --desktop-file "$APPDIR/usr/share/applications/qrtext.desktop" \
            --icon-file "$APPDIR/usr/share/icons/qrtext.png" \
            --plugin gtk 2>&1 | tail -3

          # ── 2. 强制复制 glibc 全家桶 ──
          echo "复制 glibc 全家桶..."
          for lib in libc.so.6 libm.so.6 libpthread.so.0 libdl.so.2 librt.so.1 \
                     libstdc++.so.6 libgcc_s.so.1 ld-linux-x86-64.so.2; do
            SRC=$(find /lib /usr/lib -name "$lib" -type f 2>/dev/null | head -1)
            [ -n "$SRC" ] && cp -L "$SRC" "$APPDIR/usr/lib/" && echo "  ✓ $lib"
          done

          # ── 3. patchelf：清除所有打包库的 RPATH，确保 LD_LIBRARY_PATH 优先生效 ──
          echo "清除库文件的 RPATH/RUNPATH..."
          find "$APPDIR/usr/lib" -name '*.so*' -type f | while read lib; do
            patchelf --remove-rpath "$lib" 2>/dev/null || true
          done
          echo "  ✓ 已清除所有库的 RPATH"

          echo "修补二进制..."
          patchelf --set-rpath '$ORIGIN/../lib:$ORIGIN/../lib/x86_64-linux-gnu' \
                   "$APPDIR/usr/bin/qrtext"
          echo "  ✓ rpath 已设置"

          # ── Step 4: AppRun（直接调用 ld-linux，绕过 ELF 解释器） ──
          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          export PATH="$APPDIR/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$APPDIR/usr/lib:$APPDIR/usr/lib/x86_64-linux-gnu"
          export GTK_PATH="$APPDIR/usr/lib/x86_64-linux-gnu/gtk-3.0"
          export GIO_MODULE_DIR="$APPDIR/usr/lib/x86_64-linux-gnu/gio/modules"
          export GDK_PIXBUF_MODULE_FILE="$APPDIR/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders.cache"
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          exec "$APPDIR/usr/lib/ld-linux-x86-64.so.2" --library-path "$APPDIR/usr/lib:$APPDIR/usr/lib/x86_64-linux-gnu" "$APPDIR/usr/bin/qrtext" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # ── 5. appimagetool 打包 ──
          echo "打包 AppImage..."
          wget -qO /usr/local/bin/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

          ARCH=x86_64 appimagetool "$APPDIR" "/tmp/QRTEXT-x86_64.AppImage" 2>&1 | tail -3

          # ── 检查 ──
          APPI="/tmp/QRTEXT-x86_64.AppImage"
          if [ -f "$APPI" ]; then
            DEST="$GITHUB_WORKSPACE/src-tauri/target/release/bundle/appimage/"
            mkdir -p "$DEST"
            cp "$APPI" "$DEST"
            ls -lh "$DEST"
            echo "✓ 自包含 AppImage（完整 glibc + webkit2gtk-4.1 + GTK3）"
          else
            echo "⚠ AppImage 生成失败"
            exit 1
          fi

      - name: 验证 AppImage 内部依赖
        run: |
          APPI=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          echo "验证: $APPI ($(du -h "$APPI" | cut -f1))"

          # 提取并检查
          chmod +x "$APPI"
          "$APPI" --appimage-extract >/dev/null 2>&1 || {
            echo "::warning::--appimage-extract 失败，尝试 unsquashfs..."
            OFFSET=$(grep -abo 'hsqs' "$APPI" | awk -F: '$1 > 131072 {print $1; exit}')
            dd if="$APPI" bs=1 skip="$OFFSET" of=/tmp/v.squashfs status=none 2>/dev/null
            unsquashfs -d squashfs-root /tmp/v.squashfs >/dev/null 2>&1
          }

          echo "=== 内部关键库 ==="
          ls -la squashfs-root/usr/lib/libstdc++* squashfs-root/usr/lib/libc.so* squashfs-root/usr/lib/ld-linux* 2>/dev/null || echo "  (部分库未找到)"

          echo ""
          echo "=== libstdc++ GLIBCXX 版本 ==="
          strings squashfs-root/usr/lib/libstdc++.so.6 2>/dev/null | grep GLIBCXX | tail -3

          echo ""
          echo "=== AppRun 自包含检查 ==="
          grep -c 'ld-linux' squashfs-root/AppRun 2>/dev/null && echo "✓ 使用自包含 ld-linux（不依赖系统 glibc）" || echo "⚠ 未使用自包含 ld-linux"

          rm -rf squashfs-root /tmp/v.squashfs

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ── macOS 双架构 .dmg（ARM64 + x86_64） ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - run: npm ci
      - run: npx vite build

      - name: 构建 ARM64（Apple Silicon）
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles dmg --target aarch64-apple-darwin

      - name: 构建 x86_64（Intel）
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles dmg --target x86_64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ── Windows 便携版 .zip ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npx vite build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles nsis

      - name: 制作绿色便携版 zip
        shell: bash
        run: |
          # 直接从 Tauri 构建输出目录打包，不依赖 NSIS 提取
          RELEASE_DIR="src-tauri/target/release"
          mkdir -p QRTEXT-portable

          cp "$RELEASE_DIR/qrtext.exe" QRTEXT-portable/
          # 复制所有依赖 DLL
          cp "$RELEASE_DIR"/*.dll QRTEXT-portable/ 2>/dev/null || true

          # 验证 exe 存在
          if [ -f "QRTEXT-portable/qrtext.exe" ]; then
            ls -lh QRTEXT-portable/
            7z a QRTEXT-portable.zip QRTEXT-portable/
            mkdir -p "$RELEASE_DIR/bundle/zip"
            cp QRTEXT-portable.zip "$RELEASE_DIR/bundle/zip/"
            echo "✓ 便携版 zip 就绪"
          else
            echo "⚠ qrtext.exe 未找到"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            src-tauri/target/release/bundle/nsis/*_x64-setup.exe
            src-tauri/target/release/bundle/zip/*.zip
          if-no-files-found: error

  # ── 发布 Release ──
  release:
    needs: [build-linux, build-macos, build-windows]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      # ── 自动 Release（版本号 = package.json 版本 + commit SHA） ──
      - name: 生成 CHANGELOG & 创建 Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VER=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short=7 HEAD)
          TAG="v${VER}-${SHA}"
          echo "版本: ${VER}   commit: ${SHA}   tag: ${TAG}"

          # 生成 CHANGELOG 条目
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="${LAST_TAG:+${LAST_TAG}..}HEAD"
          TODAY=$(date +%Y-%m-%d)

          {
            echo ""
            echo "## ${VER} (${TODAY})"
            echo ""
            git log ${RANGE} --pretty=format:"- %s" --no-merges 2>/dev/null || echo "- 自动构建"
            echo ""
          } >> /tmp/changelog-entry.md

          # 插入 CHANGELOG
          TITLE_END=$(grep -n '^## ' CHANGELOG.md | head -1 | cut -d: -f1)
          TITLE_END=$((TITLE_END - 1))
          head -n $TITLE_END CHANGELOG.md > /tmp/new-changelog.md
          cat /tmp/changelog-entry.md >> /tmp/new-changelog.md
          tail -n +$((TITLE_END + 1)) CHANGELOG.md >> /tmp/new-changelog.md
          mv /tmp/new-changelog.md CHANGELOG.md

          # 更新 README 版本号
          sed -i "s/当前版本：\*\*[0-9.]*\*\*/当前版本：**${VER}**/" README.md

          # 提交 CHANGELOG + README（[skip ci] 防止循环）
          git add CHANGELOG.md README.md
          git commit -m "docs: update changelog for ${VER} [skip ci]" || echo "(无变更)"
          git push origin main

          # 打 tag 并推送
          git tag "${TAG}"
          git push origin "${TAG}"

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VER}" >> $GITHUB_OUTPUT
        id: bump

      # ── 创建 GitHub Release ──
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          body_path: CHANGELOG.md
          files: packages/**
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
