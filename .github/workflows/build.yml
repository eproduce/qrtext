name: Build & Release
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Linux .deb / AppImage ──
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - uses: dtolnay/rust-toolchain@stable

      - run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - run: npm ci

      - name: Build
        run: npm run tauri:build -- --bundles deb,appimage

      - name: Debug — list bundle output
        run: find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle output found"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ── macOS .dmg ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Build
        run: npm run tauri:build -- --bundles dmg

      - name: Debug — list bundle output
        run: find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle output found"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ── Windows .msi ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Build
        run: npm run tauri:build -- --bundles msi

      - name: Debug — list bundle output
        shell: pwsh
        run: Get-ChildItem -Recurse src-tauri/target/release/bundle -File 2>$null || Write-Host "No bundle output found"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  # ── 发布 GitHub Release ──
  release:
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
