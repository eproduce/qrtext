<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#00F2FE"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="12" y="12" width="488" height="488" rx="120" fill="url(#bg)"/>

  <!-- 扫描光线 -->
  <rect x="80" y="232" width="352" height="48" rx="24" fill="url(#glow)" opacity="0.15"/>
  <rect x="200" y="240" width="112" height="32" rx="16" fill="url(#glow)" opacity="0.4"/>

  <!-- QR 定位图案：左上 -->
  <rect x="100" y="100" width="80" height="80" rx="18" fill="none" stroke="#fff" stroke-width="14" opacity="0.9"/>
  <rect x="124" y="124" width="32" height="32" rx="6" fill="#4FACFE"/>

  <!-- QR 定位图案：右上 -->
  <rect x="332" y="100" width="80" height="80" rx="18" fill="none" stroke="#fff" stroke-width="14" opacity="0.9"/>
  <rect x="356" y="124" width="32" height="32" rx="6" fill="#4FACFE"/>

  <!-- QR 定位图案：左下 -->
  <rect x="100" y="332" width="80" height="80" rx="18" fill="none" stroke="#fff" stroke-width="14" opacity="0.9"/>
  <rect x="124" y="356" width="32" height="32" rx="6" fill="#4FACFE"/>

  <!-- 右下数据点 -->
  <circle cx="356" cy="356" r="10" fill="#fff" opacity="0.5"/>
  <circle cx="384" cy="356" r="10" fill="#fff" opacity="0.3"/>
  <circle cx="356" cy="384" r="10" fill="#fff" opacity="0.3"/>
  <circle cx="384" cy="384" r="10" fill="#fff" opacity="0.15"/>
</svg>

