name: Build & Release
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Linux .deb / AppImage（麒麟 SP1 V10 / glibc 2.31 兼容） ──
  # 在 ubuntu:20.04 容器内构建，确保 glibc ≤ 2.31 兼容老旧系统
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 构建容器并编译
        run: |
          docker build -t qrtext-ci -f .github/ci.Dockerfile .
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            qrtext-ci bash -c "
              set -e
              echo '=== glibc 版本 ==='
              ldd --version | head -1
              echo ''
              echo '=== 安装 npm 依赖 ==='
              npm ci
              echo ''
              echo '=== 构建前端 ==='
              npx vite build
              echo ''
              echo '=== 构建 Tauri (deb + AppImage) ==='
              npx tauri build --bundles deb,appimage
              echo ''
              echo '=== 检查二进制 glibc 需求 ==='
              echo 'glibc 最大版本需求:'
              objdump -T src-tauri/target/release/qrtext | grep -oP 'GLIBC_\K[0-9.]+' | sort -Vu | tail -3 || true
            "

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ── macOS .dmg ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npx vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ── Windows .msi ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npx vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles msi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  # ── 发布 Release / Nightly ──
  release:
    needs: [build-linux, build-macos, build-windows]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Nightly Release（main 分支）
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: '🚧 最新开发版本，自动从 main 分支构建。'
          prerelease: true
          files: packages/**
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 版本 Release（v* tag）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
