name: Build & Release
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Linux .deb / AppImage（麒麟 SP1 V10 / glibc 2.31 兼容） ──
  # 使用 ubuntu-20.04 以确保 glibc 版本兼容老旧系统
  build-linux:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable

      # 安装系统依赖（含 webkit2gtk-4.1 从 jammy 源获取）
      - name: 安装构建依赖
        run: |
          sudo apt-get update

          # 基础依赖（focal 自带）
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libglib2.0-dev libssl-dev \
            file patchelf wget

          # webkit2gtk-4.1 需要从 jammy 手动拉取
          # 这些 .deb 的依赖基本满足，通常不需要完整的 jammy 源
          JWKIT_VER="2.48.1-0ubuntu0.22.04.1"
          JWKIT_BASE="http://archive.ubuntu.com/ubuntu/pool/universe/w/webkit2gtk"
          cd /tmp
          for pkg in \
            "libjavascriptcoregtk-4.1-0_${JWKIT_VER}_amd64.deb" \
            "libwebkit2gtk-4.1-0_${JWKIT_VER}_amd64.deb" \
            "libjavascriptcoregtk-4.1-dev_${JWKIT_VER}_amd64.deb" \
            "libwebkit2gtk-4.1-dev_${JWKIT_VER}_amd64.deb"; do
            wget -q "${JWKIT_BASE}/${pkg}" && sudo dpkg -i "$pkg" || echo "跳过 $pkg"
          done
          sudo apt-get install -f -y --no-install-recommends
          pkg-config --exists webkit2gtk-4.1 && echo "✓ webkit2gtk-4.1 OK"

      - run: npm ci
      - run: npx vite build

      # 使用 tauri-action 构建 deb 和 AppImage
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles deb,appimage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ── macOS .dmg ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npx vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ── Windows .msi ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npx vite build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles msi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  # ── 发布 Release / Nightly ──
  release:
    needs: [build-linux, build-macos, build-windows]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Nightly Release（main 分支）
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: '🚧 最新开发版本，自动从 main 分支构建。'
          prerelease: true
          files: packages/**
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 版本 Release（v* tag）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
