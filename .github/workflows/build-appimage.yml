# ═══════════════════════════════════════════════════════════════
#  GitHub Actions：构建 AppImage → 麒麟离线部署
#
#  触发方式：
#    - 推送 tag v* 时自动构建 + 发布 Release
#    - 手动在 Actions 页面触发（workflow_dispatch）
#
#  产物：兼容麒麟 SP1 V10 的 AppImage
#        - webkit2gtk-4.1 已打包（Tauri 自动处理）
#        - libstdc++.so.6 已打入（patch-appimage.sh，含 GLIBCXX_3.4.30）
#        - AppRun 解释器路径已修正为标准 /lib64/
# ═══════════════════════════════════════════════════════════════
name: Build AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            libssl-dev \
            libdbus-1-dev \
            patchelf \
            squashfs-tools \
            file

      - name: 安装 npm 依赖
        run: npm ci

      - name: 构建前端
        run: npx vite build

      - name: 构建 Tauri AppImage
        run: npx tauri build --bundles appimage

      - name: 检查 glibc 兼容性（麒麟 ≈ 2.28~2.31）
        run: |
          BIN="src-tauri/target/release/qrtext"
          echo "=== 二进制链接的 glibc 符号 ==="
          objdump -T "$BIN" 2>/dev/null | grep -oP 'GLIBC_\d+\.\d+' | sort -Vu | tail -5
          MAX_GLIBC=$(objdump -T "$BIN" 2>/dev/null | grep -oP 'GLIBC_\d+\.\d+' | sort -Vu | tail -1)
          echo ""
          echo "最高要求: $MAX_GLIBC  (麒麟 ≈ GLIBC_2.28~2.31)"
          if echo "$MAX_GLIBC" | grep -qE 'GLIBC_2\.(3[2-9]|[4-9][0-9])'; then
            echo "::warning::需要 glibc >= 2.32，麒麟可能不兼容！"
          else
            echo "✓ glibc 版本兼容麒麟"
          fi

      - name: 修补 AppImage（打入 libstdc++ + 修正 AppRun + 修正 RPATH）
        run: bash scripts/patch-appimage.sh

      - name: 最终验证
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          echo "AppImage: $APPIMAGE"
          echo "大小: $(du -h "$APPIMAGE" | cut -f1)"
          echo ""
          echo "=== 提取 squashfs 验证内容 ==="
          OFFSET=$(grep -abo 'hsqs' "$APPIMAGE" 2>/dev/null | awk -F: '$1 > 131072 {print $1; exit}')
          if [ -n "$OFFSET" ]; then
            dd if="$APPIMAGE" bs=1 skip="$OFFSET" of=/tmp/verify.squashfs status=none 2>/dev/null
            unsquashfs -d /tmp/verify_extract /tmp/verify.squashfs >/dev/null 2>&1 || true
            if [ -f /tmp/verify_extract/usr/lib/libstdc++.so.6 ]; then
              echo "✓ libstdc++ 已打包:"
              strings /tmp/verify_extract/usr/lib/libstdc++.so.6 | grep GLIBCXX | tail -3
            fi
            if [ -f /tmp/verify_extract/usr/bin/qrtext ]; then
              echo "✓ 二进制 glibc 需求:"
              objdump -T /tmp/verify_extract/usr/bin/qrtext 2>/dev/null | grep -oP 'GLIBC_\d+\.\d+' | sort -Vu | tail -3
            fi
            rm -rf /tmp/verify.squashfs /tmp/verify_extract
          else
            echo "⚠ 无法定位 squashfs，跳过内容验证"
          fi

      - name: 上传 AppImage 产物
        uses: actions/upload-artifact@v4
        with:
          name: QRTEXT-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: 发布 Release（仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/appimage/*.AppImage
          generate_release_notes: true
