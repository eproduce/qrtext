# ═══════════════════════════════════════════════════════════════
#  GitHub Actions：构建 AppImage → 麒麟离线部署
#
#  触发方式：
#    - 推送 tag v* 时自动构建
#    - 手动在 Actions 页面触发（workflow_dispatch）
#
#  产物：兼容麒麟 SP1 V10 的 AppImage（已打入 libstdc++）
# ═══════════════════════════════════════════════════════════════
name: Build AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            libssl-dev \
            libdbus-1-dev \
            patchelf \
            squashfs-tools \
            file

      - name: 预下载 Ubuntu 22.04 libstdc++6（供 patch 脚本使用）
        run: |
          mkdir -p /tmp/qrtext-libstdcxx
          cd /tmp
          wget -q "http://archive.ubuntu.com/ubuntu/pool/main/g/gcc-12/libstdc++6_12.3.0-1ubuntu1~22.04_amd64.deb"
          dpkg-deb -x "libstdc++6_12.3.0-1ubuntu1~22.04_amd64.deb" /tmp/qrtext-libstdcxx
          rm -f "libstdc++6_12.3.0-1ubuntu1~22.04_amd64.deb"
          wget -q "http://archive.ubuntu.com/ubuntu/pool/main/g/gcc-12/libgcc-s1_12.3.0-1ubuntu1~22.04_amd64.deb"
          dpkg-deb -x "libgcc-s1_12.3.0-1ubuntu1~22.04_amd64.deb" /tmp/qrtext-libstdcxx
          rm -f "libgcc-s1_12.3.0-1ubuntu1~22.04_amd64.deb"
          echo "libstdc++ 预下载完成"
          find /tmp/qrtext-libstdcxx -name "libstdc++*" -type f

      - name: 安装 npm 依赖
        run: npm ci

      - name: 构建前端
        run: npx vite build

      - name: 构建 Tauri AppImage
        run: npx tauri build --bundles appimage

      - name: 修补 AppImage（打入 libstdc++ + 修正 AppRun）
        run: bash scripts/patch-appimage.sh

      - name: 验证 AppImage
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          echo "AppImage: $APPIMAGE"
          echo "大小: $(du -h "$APPIMAGE" | cut -f1)"

          # 验证内部 libstdc++
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract >/dev/null 2>&1
          if [ -f squashfs-root/usr/lib/libstdc++.so.6 ]; then
            GLIBCXX_VER=$(strings squashfs-root/usr/lib/libstdc++.so.6 | grep -oP 'GLIBCXX_\d+\.\d+\.\d+' | sort -Vu | tail -1)
            echo "✓ 内部 libstdc++ 最高版本: $GLIBCXX_VER"
          fi
          rm -rf squashfs-root

      - name: 上传 AppImage 产物
        uses: actions/upload-artifact@v4
        with:
          name: QRTEXT-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: 发布 Release（仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/appimage/*.AppImage
          generate_release_notes: true
