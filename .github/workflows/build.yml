name: Build & Release
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Linux AppImage（完全自包含，不依赖系统 glibc/GTK） ──
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable

      - name: 自动设置 nightly 版本号
        run: node scripts/bump-version.cjs "$(node -p "require('./package.json').version")-nightly.${{ github.run_number }}"

      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libssl-dev patchelf file

      - run: npm ci
      - run: npx vite build

      - name: 构建 Tauri 二进制
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles deb

      - name: 制作完全自包含 AppImage
        run: |
          set -e
          BIN="src-tauri/target/release/qrtext"
          APPDIR="/tmp/QRTEXT.AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/icons" "$APPDIR/usr/share/applications"

          cp "$BIN" "$APPDIR/usr/bin/qrtext"

          cat > "$APPDIR/usr/share/applications/qrtext.desktop" << 'DESKEOF'
          [Desktop Entry]
          Type=Application
          Name=QRTEXT
          Icon=qrtext
          Exec=qrtext
          Categories=Utility;
          DESKEOF

          cp src-tauri/icons/128x128.png "$APPDIR/usr/share/icons/qrtext.png"
          cp src-tauri/icons/128x128.png "$APPDIR/qrtext.png"

          # AppRun：强制使用 AppImage 内的库，不碰系统库
          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$HERE/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
          export GTK_PATH="$HERE/usr/lib/x86_64-linux-gnu/gtk-3.0"
          export GIO_MODULE_DIR="$HERE/usr/lib/x86_64-linux-gnu/gio/modules"
          export GDK_PIXBUF_MODULE_FILE="$HERE/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders.cache"
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          exec "$HERE/usr/bin/qrtext" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # 安装 linuxdeploy（continuous 版本会自动捆 glibc）
          wget -qO /usr/local/bin/linuxdeploy \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x /usr/local/bin/linuxdeploy

          # 安装 GTK 插件（自动拉所有 GTK3 依赖）
          wget -qO /usr/local/bin/linuxdeploy-plugin-gtk.sh \
            "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          chmod +x /usr/local/bin/linuxdeploy-plugin-gtk.sh

          # ── 关键：强制复制 glibc 和 ld-linux 到 AppDir ──
          # linuxdeploy 默认会跳过这些"基系统"库，我们手动塞进去
          mkdir -p "$APPDIR/usr/lib"
          LIBC=$(ldd "$BIN" | grep 'libc\.so\.6' | awk '{print $3}')
          LD_SO=$(ldd "$BIN" | grep 'ld-linux' | awk '{print $3}')
          [ -f "$LIBC" ] && cp -L "$LIBC" "$APPDIR/usr/lib/"
          [ -f "$LD_SO" ] && cp -L "$LD_SO" "$APPDIR/usr/lib/"

          # 运行 linuxdeploy：自动拉所有 NEEDED 库 + GTK 插件
          cd /tmp
          DEPLOY_GTK_VERSION=3 linuxdeploy \
            --appdir "$APPDIR" \
            --desktop-file "$APPDIR/usr/share/applications/qrtext.desktop" \
            --icon-file "$APPDIR/usr/share/icons/qrtext.png" \
            --plugin gtk \
            --output appimage 2>&1 | tail -15

          # 检查结果
          APPI=$(ls /tmp/QRTEXT*.AppImage 2>/dev/null | head -1)
          if [ -n "$APPI" ]; then
            DEST="$GITHUB_WORKSPACE/src-tauri/target/release/bundle/appimage/"
            mkdir -p "$DEST"
            cp "$APPI" "$DEST"
            ls -lh "$DEST"
            echo "✓ 自包含 AppImage 就绪（含 glibc + webkit2gtk-4.1 + GTK3）"
          else
            echo "⚠ AppImage 生成失败"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ── macOS 双架构 .dmg（ARM64 + x86_64） ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: 自动设置 nightly 版本号
        run: node scripts/bump-version.cjs "$(node -p "require('./package.json').version")-nightly.${{ github.run_number }}"
      - run: npm ci
      - run: npx vite build

      - name: 构建 ARM64（Apple Silicon）
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles dmg --target aarch64-apple-darwin

      - name: 构建 x86_64（Intel）
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles dmg --target x86_64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ── Windows 便携版 .zip ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
      - name: 自动设置 nightly 版本号
        run: node scripts/bump-version.cjs "$(node -p "require('./package.json').version")-nightly.${{ github.run_number }}"
      - run: npm ci
      - run: npx vite build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles nsis

      - name: 制作绿色便携版 zip
        shell: bash
        run: |
          # NSIS 安装包可用 7z 解压得到绿色版
          SETUP=$(ls src-tauri/target/release/bundle/nsis/*_x64-setup.exe 2>/dev/null | head -1)
          if [ -f "$SETUP" ]; then
            7z x -oQRTEXT-portable "$SETUP" -y
            # 删除卸载程序，保留纯运行文件
            rm -f QRTEXT-portable/uninst.exe QRTEXT-portable/\$PLUGINSDIR -rf
            7z a QRTEXT-portable.zip QRTEXT-portable/
            mkdir -p src-tauri/target/release/bundle/zip
            cp QRTEXT-portable.zip src-tauri/target/release/bundle/zip/
            echo "✓ 便携版 zip 就绪"
          else
            echo "⚠ NSIS 打包失败，回退：直接打包二进制"
            mkdir -p QRTEXT-portable
            cp src-tauri/target/release/qrtext.exe QRTEXT-portable/ 2>/dev/null || true
            7z a QRTEXT-portable.zip QRTEXT-portable/ || true
            mkdir -p src-tauri/target/release/bundle/zip
            cp QRTEXT-portable.zip src-tauri/target/release/bundle/zip/ 2>/dev/null || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            src-tauri/target/release/bundle/nsis/*_x64-setup.exe
            src-tauri/target/release/bundle/zip/*.zip
          if-no-files-found: error

  # ── 发布 Release ──
  release:
    needs: [build-linux, build-macos, build-windows]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      # ── main 分支：自动升版号 + CHANGELOG + Release ──
      - name: 自动升版号 & 生成 CHANGELOG
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 计算新版本（patch +1）
          VER=$(node -p "require('./package.json').version")
          MAJOR=$(echo $VER | cut -d. -f1)
          MINOR=$(echo $VER | cut -d. -f2)
          PATCH=$(echo $VER | cut -d. -f3)
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "新版本: v${NEW}"

          # 更新版本号
          node scripts/bump-version.cjs "$NEW"

          # 生成 CHANGELOG 条目
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="${LAST_TAG:+${LAST_TAG}..}HEAD"
          TODAY=$(date +%Y-%m-%d)

          echo "" >> /tmp/changelog-entry.md
          echo "## ${NEW} (${TODAY})" >> /tmp/changelog-entry.md
          echo "" >> /tmp/changelog-entry.md
          git log ${RANGE} --pretty=format:"- %s" --no-merges >> /tmp/changelog-entry.md 2>/dev/null || echo "- 自动构建" >> /tmp/changelog-entry.md
          echo "" >> /tmp/changelog-entry.md

          # 插入 CHANGELOG
          TITLE_END=$(grep -n '^## ' CHANGELOG.md | head -1 | cut -d: -f1)
          TITLE_END=$((TITLE_END - 1))
          head -n $TITLE_END CHANGELOG.md > /tmp/new-changelog.md
          cat /tmp/changelog-entry.md >> /tmp/new-changelog.md
          tail -n +$((TITLE_END + 1)) CHANGELOG.md >> /tmp/new-changelog.md
          mv /tmp/new-changelog.md CHANGELOG.md

          # 更新 README 版本号
          sed -i "s/当前版本：\*\*[0-9.]*\*\*/当前版本：**${NEW}**/" README.md

          # 提交并推送（[skip ci] 防止循环触发）
          git add package.json src-tauri/tauri.conf.json CHANGELOG.md README.md
          git commit -m "chore: release v${NEW} [skip ci]" || echo "(无变更)"
          git push origin main

          # 打 tag 并推送
          git tag "v${NEW}"
          git push origin "v${NEW}"

          echo "version=${NEW}" >> $GITHUB_OUTPUT
        id: bump

      # ── 创建 GitHub Release ──
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version && format('v{0}', steps.bump.outputs.version) || github.ref_name }}
          name: ${{ steps.bump.outputs.version && format('v{0}', steps.bump.outputs.version) || github.ref_name }}
          body_path: ${{ steps.bump.outcome == 'success' && 'CHANGELOG.md' || '' }}
          files: packages/**
          generate_release_notes: ${{ steps.bump.outcome != 'success' }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
